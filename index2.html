<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RGB SLIDER</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div id="color-box"></div>
    <div id="hex-code">#000000</div>
    <div id="rgb-display">rgb(0, 0, 0)</div>
    
    <div class="controls">
        <div>
            <span>Red: </span><span id="valR">0</span>
            <input type="range" id="r" min="0" max="255" value="0">
        </div>
        <div>
            <span>Green: </span><span id="valG">0</span>
            <input type="range" id="g" min="0" max="255" value="0">
        </div>
        <div>
            <span>Blue: </span><span id="valB">0</span>
            <input type="range" id="b" min="0" max="255" value="0">
        </div>
    </div>

    <script src="main2.js"></script>
</body>
</html>
